<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matcha Energy</title>

<style>
:root{
  --bg:#f5f3ed;
  --card:#ffffff;
  --text:#1a1f16;
  --muted:#6a7265;
  --green:#6fa44b;
  --dark:#2e4a2f;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:var(--bg);color:var(--text)}
.container{width:90%;max-width:900px;margin:auto}

header{
  display:flex;
  justify-content:space-between;
  padding:20px 0;
}

nav a{
  margin-left:20px;
  color:var(--muted);
}

.hero{text-align:center;padding:60px 0}
.hero h1{font-size:clamp(2.5rem,6vw,4rem);color:var(--dark)}
.hero p{color:var(--muted);margin-top:10px}

/* SLIDER */
.hero-img{
  margin-top:30px;
  height:300px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.hero-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;left:0;
  opacity:0;
  transition:opacity 1s ease;
}

.hero-img img.active{
  opacity:1;
}

.overlay{
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  color:white;
  font-weight:600;
  text-align:left;
  background:rgba(0,0,0,0.3);
  padding:10px 15px;
  border-radius:10px;
}

.links{
  margin-top:40px;
  display:flex;
  gap:20px;
  justify-content:center;
}

.link-card{
  background:var(--card);
  padding:25px 30px;
  border-radius:20px;
  text-align:center;
}

.link-card h3{color:var(--dark);margin-bottom:8px}
.link-card p{color:var(--muted);font-size:0.9rem}

footer{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>

<body>

<div class="container">

<header>
  <h2>Matcha Energy</h2>
  <nav>
    <a href="powder.html">Powder</a>
    <a href="menu.html">Menu</a>
    <a href="ingredients.html">Ingredients</a>
  </nav>
</header>

<div class="hero">
  <h1>Matcha Energy</h1>
  <p>Clean energy. Simple menu. Premium matcha.</p>

  <!-- SLIDER -->
  <div class="hero-img">
    <img src="https://images.unsplash.com/photo-1559561853-08451507cbe7" class="active">
    <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">

    <div class="overlay" id="overlayText">
      Premium matcha for clean energy
    </div>
  </div>

  <div class="links">

    <a href="powder.html" class="link-card">
      <h3>Matcha Powder</h3>
      <p>Learn about the 3 grades</p>
    </a>

    <a href="menu.html" class="link-card">
      <h3>Menu</h3>
      <p>See drinks and prices</p>
    </a>

    <a href="ingredients.html" class="link-card">
      <h3>Ingredients</h3>
      <p>What we use</p>
    </a>

  </div>
</div>

</div>

<footer>
  © 2026 Matcha Energy
</footer>

<script>
const images = document.querySelectorAll('.hero-img img');
const texts = [
  "Premium matcha for clean energy",
  "No crash, smooth focus",
  "Simple ingredients, powerful effect"
];

let index = 0;

setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
  document.getElementById('overlayText').innerText = texts[index];
}, 10000);
</script>

</body>
</html>
